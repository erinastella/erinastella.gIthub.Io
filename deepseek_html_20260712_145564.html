<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repo Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com">
    </script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['Fira Code', 'monospace'],
                    },
                    colors: {
                        brand: {
                            50: '#f0fdfa',
                            100: '#ccfbf1',
                            500: '#14b8a6',
                            600: '#0d9488',
                            900: '#134e4a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        .dark ::-webkit-scrollbar-thumb {
            background: #475569;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        .dark ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }
        .markdown-body {
            all: revert;
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
        }
        .markdown-body pre {
            background: #1e293b;
            padding: 1rem;
            border-radius: 0.5rem;
            color: #f8fafc;
            overflow-x: auto;
        }
        .markdown-body code {
            font-family: 'Fira Code', monospace;
            font-size: 0.9em;
            background: rgba(128, 128, 128, 0.2);
            padding: 0.125rem 0.25rem;
            border-radius: 0.25rem;
        }
        .markdown-body pre code {
            background: none;
            padding: 0;
        }
        .markdown-body h1,
        .markdown-body h2 {
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 0.3em;
            margin-top: 1.5em;
        }
        .dark .markdown-body h1,
        .dark .markdown-body h2 {
            border-color: #334155;
        }
        .markdown-body a {
            color: #0ea5e9;
            text-decoration: none;
        }
        .markdown-body a:hover {
            text-decoration: underline;
        }
        .dropdown-menu {
            position: absolute;
            z-index: 50;
            min-width: 180px;
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 0.5rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            padding: 0.25rem 0;
        }
        .dark .dropdown-menu {
            background: #1e293b;
            border-color: #334155;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
        }
        .dropdown-menu button,
        .dropdown-menu a {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            width: 100%;
            padding: 0.5rem 1rem;
            text-align: left;
            font-size: 0.875rem;
            color: #374151;
            transition: background 0.15s;
            white-space: nowrap;
        }
        .dark .dropdown-menu button,
        .dark .dropdown-menu a {
            color: #d1d5db;
        }
        .dropdown-menu button:hover,
        .dropdown-menu a:hover {
            background: #f3f4f6;
        }
        .dark .dropdown-menu button:hover,
        .dark .dropdown-menu a:hover {
            background: #334155;
        }
        .dropdown-menu .danger {
            color: #ef4444;
        }
        .dark .dropdown-menu .danger {
            color: #f87171;
        }
        .dropdown-menu .divider {
            border-top: 1px solid #e5e7eb;
            margin: 0.25rem 0;
        }
        .dark .dropdown-menu .divider {
            border-color: #475569;
        }
        @media (max-width:767px) {
            #mobile-blocker {
                display: flex !important;
            }
            #app-shell {
                display: none !important;
            }
            #toast-container {
                display: none !important;
            }
        }
        @media (min-width:768px) {
            #mobile-blocker {
                display: none !important;
            }
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .ace-editor {
            font-size: 14px !important;
            line-height: 1.5 !important;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.7/ace.min.js">
    </script>
</head>
<body
    class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 font-sans h-screen overflow-hidden flex flex-col selection:bg-brand-500 selection:text-white transition-colors duration-200">
    <div id="mobile-blocker"
        style="display:none;position:fixed;inset:0;z-index:9999;background:#111827;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;">
        <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none"
            stroke="#14b8a6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="3" width="20" height="14" rx="2" ry="2" />
            <line x1="8" y1="21" x2="16" y2="21" />
            <line x1="12" y1="17" x2="12" y2="21" />
        </svg>
        <h2 class="text-white text-xl font-bold mt-6 mb-2">Repo Studio</h2>
        <p class="text-gray-400 max-w-md leading-relaxed">Repo Studio works best with Desktop.<br>Please switch to desktop
            mode or use a desktop device to continue.</p>
        <p class="text-gray-600 text-sm mt-4">Minimum screen width: 768px</p>
    </div>
    <div id="app-shell" class="h-full w-full flex">
        <div id="app" class="h-full w-full flex"></div>
    </div>
    <div id="toast-container" class="fixed bottom-4 right-4 flex flex-col gap-2 z-50 pointer-events-none"></div>

        const escapeHtml = (unsafe) => (unsafe || '').toString().replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(

        const decodeBase64 = (b64) => new TextDecoder().decode(new Uint8Array(atob(b64).split('').map(c => c.charCodeAt(
            0))));
        const debounce = (func, wait) => {

                    apiFetch(`/repos/${owner}/${repo}`, { method: 'DELETE' });
                showToast('Repository deleted', 'success');
                await fetchRepos();
                window.location.hash = '/'; } catch (e) { showToast(`Failed: ${e.message}`, 'error'); } }); }

        async function renderSearchPage(query) { try { const [repoRes, userRes] = await Promise.all([ apiFetch(
                    `/search/repositories?q=${encodeURIComponent(query)}&per_page=10`), apiFetch(
                    `/search/users?q=${encodeURIComponent(query)}&per_page=10`) ]); let html = `
        <div class="max-w-5xl mx-auto space-y-8">
            <h2 class="text-2xl font-bold">Search Results for "${escapeHtml(query)}"</h2>
            <div>
                <h3 class="font-semibold text-xl mb-4">Repositories</h3>
                ${repoRes.items.length===0?'<p class="text-gray-500">No repositories found.</p>':repoRes.items.map(repo=>`
                <div class="flex items-start justify-between p-4 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg mb-3">
                    <div>
                        <a href="#/repo/${repo.owner.login}/${repo.name}" class="font-medium text-brand-600 hover:underline">${escapeHtml(repo.full_name)}</a>
                        <p class="text-sm text-gray-500 mt-1">${escapeHtml(repo.description||'No description')}</p>
                        <div class="flex items-center gap-4 mt-2 text-xs text-gray-400">
                            <span>${icons.star} ${repo.stargazers_count}</span>
                            <span>${repo.language?escapeHtml(repo.language):''}</span>
                        </div>
                    </div>
                    ${repo.owner.login!==state.user.login?`<button class="fork-btn px-3 py-1 text-sm bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 rounded flex items-center gap-1" data-repo="${repo.full_name}">${icons.fork} Fork</button>`:''}
                </div>
                `).join('')}
            </div>
            <div>
                <h3 class="font-semibold text-xl mb-4">Users</h3>
                ${userRes.items.length===0?'<p class="text-gray-500">No users found.</p>':userRes.items.map(user=>`
                <div class="flex items-center justify-between p-4 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg mb-3">
                    <div class="flex items-center gap-3">
                        <img src="${user.avatar_url}" class="w-10 h-10 rounded-full">
                        <div>
                            <a href="https://github.com/${user.login}" target="_blank" class="font-medium hover:underline">${escapeHtml(user.login)}</a>
                            <p class="text-xs text-gray-500">${escapeHtml(user.type||'User')}</p>
                        </div>
                    </div>
                    <button class="follow-btn px-3 py-1 text-sm border border-gray-300 dark:border-gray-600 rounded hover:bg-gray-100 dark:hover:bg-gray-700 flex items-center gap-1" data-user="${user.login}">${icons.follow} Follow</button>
                </div>
                `).join('')}
            </div>
        </div>`; return html; } catch (e) { return `<div class="p-8 text-center text-red-500">Search failed: ${escapeHtml(e.message)}</div>`
            ; } }

        function setupSearchEvents() { document.querySelectorAll('.fork-btn').forEach(btn => { btn.addEventListener('click',
                async () => { const fullName = btn.dataset.repo; const [owner, repo] = fullName.split('/'); try { const
                        result = await apiFetch(`/repos/${owner}/${repo}/forks`, { method: 'POST' });
                    showToast(`Forked to ${result.full_name}`, 'success');
                    window.location.hash = `/repo/${result.owner.login}/${result.name}`; } catch (e) { showToast(
                        `Fork failed: ${e.message}`, 'error'); } }); });
            document.querySelectorAll('.follow-btn').forEach(btn => { btn.addEventListener('click', async () => { const
                    username = btn.dataset.user; try { await apiFetch(`/user/following/${username}`, { method: 'PUT' });
                    showToast(`Now following ${username}`, 'success');
                    btn.disabled = true;
                    btn.innerHTML = `${icons.check} Following`; } catch (e) { showToast(`Failed to follow: ${e.message}`,
                        'error'); } }); }); }

        function setupGlobalEvents() { document.addEventListener('keydown', (e) => { const tag = e.target.tagName
                .toLowerCase(); const inInput = tag === 'input' || tag === 'textarea'; if (state.currentRoute.view ===
                    'repo' && state.currentRoute.path) { if (e.key === 'e' && !inInput && !e.ctrlKey && !e.metaKey) { e
                        .preventDefault(); const editBtn = document.getElementById('editBtn'); if (editBtn) editBtn.click(); }
                    if (e.key === 's' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); if (state.editor.isEditing) { const
                            saveBtn = document.getElementById('saveBtn'); if (saveBtn) saveBtn.click(); } } } });
            document.getElementById('globalSearchBtn')?.addEventListener('click', () => { const query = document
                .getElementById('globalSearchInput').value.trim(); if (query) window.location.hash =
                `/search?q=${encodeURIComponent(query)}`; });
            document.getElementById('globalSearchInput')?.addEventListener('keypress', (e) => { if (e.key === 'Enter') {
                    const query = e.target.value.trim(); if (query) window.location.hash =
                    `/search?q=${encodeURIComponent(query)}`; } }); }

        async function init() { if (state.token) { try { state.user = await apiFetch('/user');
                    state.currentRoute = parseHash(); } catch (e) { state.token = '';
                    localStorage.removeItem(STORAGE_KEY); } }
            render(); const observer = new MutationObserver(() => { const readmeEl = document.getElementById(
                    'readmePreviewInline'); if (readmeEl && state.currentRoute.view === 'repo' && !state.currentRoute
                    .path) { const { owner, repo, branch } = state.currentRoute;
                    loadReadmeInline(owner, repo, branch || 'main');
                    observer.disconnect(); } });
            observer.observe(document.body, { childList: true, subtree: true }); }
        init();
    </script>
</body>
</html>
