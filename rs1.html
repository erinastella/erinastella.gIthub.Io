const escapeHtml = (unsafe) => (unsafe||'').toString().replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");

// UTF-8 safe base64 encoding/decoding
const encodeBase64 = (str) => btoa(new Uint8Array(new TextEncoder().encode(str)).reduce((data, byte) => data + String.fromCharCode(byte), ''));
const decodeBase64 = (b64) => new TextDecoder().decode(new Uint8Array(atob(b64).split('').map(c => c.charCodeAt(0))));

const debounce = (func, wait) => {
    let timeout;
    return function executedFunction(...args) {
        const later = () => { clearTimeout(timeout); func(...args); };
        clearTimeout(timeout);
        timeout = setTimeout(later, wait);
    };
};

function formatSize(bytes) {
    if (bytes === 0) return '0 B';
    const k = 1024, sizes = ['B', 'KB', 'MB', 'GB'], i = Math.floor(Math.log(bytes) / Math.log(k));
    return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
}

function timeAgo(dateString) {
    const date = new Date(dateString);
    const seconds = Math.floor((new Date() - date) / 1000);
    let interval = seconds / 31536000;
    if (interval > 1) return Math.floor(interval) + " years ago";
    interval = seconds / 2592000;
    if (interval > 1) return Math.floor(interval) + " months ago";
    interval = seconds / 86400;
    if (interval > 1) return Math.floor(interval) + " days ago";
    interval = seconds / 3600;
    if (interval > 1) return Math.floor(interval) + " hours ago";
    interval = seconds / 60;
    if (interval > 1) return Math.floor(interval) + " minutes ago";
    return Math.floor(seconds) + " seconds ago";
}

// ==========================================
// 2. STATE & API
// ==========================================

const API_BASE = 'https://api.github.com';
const STORAGE_KEY = 'gh_pat_v1';

const state = {
    token: localStorage.getItem(STORAGE_KEY) || '',
    user: null,
    repos: [],
    filteredRepos: [],
    rateLimit: { remaining: '-', reset: '-' },
    theme: localStorage.getItem('theme') || 'dark',
    currentRoute: { view: 'loading' },
    editor: { content: '', originalSha: '', originalPath: '', isEditing: false, activeTab: 'code' } // activeTab: 'code', 'preview', 'history'
};

function showToast(message, type = 'info') {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    const bg = type === 'error' ? 'bg-red-500' : type === 'success' ? 'bg-green-500' : 'bg-blue-500';
    toast.className = `${bg} text-white px-4 py-2 rounded-md shadow-lg flex items-center gap-2 transform transition-all translate-y-4 opacity-0`;
    toast.innerHTML = `${type === 'error' ? icons.alert : type === 'success' ? icons.check : icons.info || ''} <span>${escapeHtml(message)}</span>`;
    container.appendChild(toast);
    
    // Animate in
    setTimeout(() => { toast.classList.remove('translate-y-4', 'opacity-0'); }, 10);
    // Animate out
    setTimeout(() => {
        toast.classList.add('translate-y-4', 'opacity-0');
        setTimeout(() => toast.remove(), 300);
    }, 3000);
}

async function apiFetch(endpoint, options = {}) {
    const headers = {
        'Accept': 'application/vnd.github.v3+json',
        ...(state.token ? { 'Authorization': `token ${state.token}` } : {}),
        ...(options.headers || {})
    };
    
    try {
        const response = await fetch(`${API_BASE}${endpoint}`, { ...options, headers });
        
        // Update rate limits
        const remaining = response.headers.get('x-ratelimit-remaining');
        if (remaining) {
            state.rateLimit.remaining = remaining;
            const resetTime = new Date(parseInt(response.headers.get('x-ratelimit-reset')) * 1000);
            state.rateLimit.reset = `${resetTime.getHours().toString().padStart(2, '0')}:${resetTime.getMinutes().toString().padStart(2, '0')}`;
            updateRateLimitUI();
        }

        if (!response.ok) {
            if (response.status === 401) throw new Error('Unauthorized. Invalid or expired token.');
            if (response.status === 403) throw new Error('Forbidden. API rate limit exceeded or insufficient scopes.');
            if (response.status === 404) throw new Error('Not found. Check path or repository permissions.');
            const errBody = await response.json().catch(()=>({}));
            throw new Error(errBody.message || `API Error: ${response.status}`);
        }

        if (response.status === 204) return null; // No content (e.g. DELETE)
        return await response.json();
    } catch (err) {
        throw err;
    }
}

function toggleTheme() {
    state.theme = state.theme === 'dark' ? 'light' : 'dark';
    localStorage.setItem('theme', state.theme);
    if (state.theme === 'dark') document.documentElement.classList.add('dark');
    else document.documentElement.classList.remove('dark');
    render();
}

async function logout() {
    if(confirm("Are you sure you want to remove your PAT and sign out?")) {
        localStorage.removeItem(STORAGE_KEY);
        state.token = '';
        state.user = null;
        state.repos = [];
        window.location.hash = '';
        render();
        showToast('Signed out successfully', 'success');
    }
}

// ==========================================
// 3. ROUTING
// ==========================================

function parseHash() {
    const hash = window.location.hash.slice(1) || '/';
    if (hash === '/') return { view: 'dashboard' };
    
    // #/repo/owner/repo/tree/branch/path/to/file
    const repoMatch = hash.match(/^\/repo\/([^\/]+)\/([^\/]+)(?:\/tree\/([^\/]+)\/?(.*))?$/);
    if (repoMatch) {
        return {
            view: 'repo',
            owner: repoMatch[1],
            repo: repoMatch[2],
            branch: repoMatch[3] || '',
            path: repoMatch[4] || ''
        };
    }
    return { view: 'notfound' };
}

window.addEventListener('hashchange', () => {
    state.currentRoute = parseHash();
    render();
});

// ==========================================
// 4. RENDERING & UI COMPONENTS
// ==========================================

function render() {
    const app = document.getElementById('app');
    
    // Init theme
    if (state.theme === 'dark') document.documentElement.classList.add('dark');
    else document.documentElement.classList.remove('dark');

    if (!state.token) {
        app.innerHTML = renderLogin();
        setupLoginEvents();
        return;
    }

    if (!state.user) {
        app.innerHTML = `<div class="flex h-full w-full items-center justify-center text-gray-500">Loading user profile...</div>`;
        return;
    }

    app.innerHTML = renderShell();
    renderMainContent();
    setupGlobalEvents();
}

function setupLoginEvents() {
    document.getElementById('loginForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const token = document.getElementById('patInput').value.trim();
        if (!token) return;
        
        try {
            state.token = token;
            const user = await apiFetch('/user');
            state.user = user;
            localStorage.setItem(STORAGE_KEY, token);
            state.currentRoute = { view: 'dashboard' };
            showToast('Authenticated successfully', 'success');
            await fetchRepos();
            render();
        } catch (err) {
            state.token = '';
            showToast(err.message, 'error');
        }
    });

    document.getElementById('themeToggleLogin')?.addEventListener('click', toggleTheme);
}

function updateRateLimitUI() {

}

function updateBreadcrumbs(html) {
    const el = document.getElementById('breadcrumb');
    if (el) el.innerHTML = html;
}

async function renderMainContent() {
    const container = document.getElementById('main-content');
    container.innerHTML = `<div class="flex justify-center mt-10">${icons.history} <span class="ml-2 animate-pulse">Loading...</span></div>`;
    
    try {
        if (state.currentRoute.view === 'dashboard') {
            updateBreadcrumbs(`<a href="#/" class="hover:text-brand-500 font-medium text-gray-900 dark:text-gray-100">Dashboard</a>`);
            if (state.repos.length === 0) await fetchRepos();
            container.innerHTML = renderDashboard();
            setupDashboardEvents();
        } else if (state.currentRoute.view === 'repo') {
            await loadRepoView(container);
        } else {
            container.innerHTML = `<div class="p-8 text-center"><h2 class="text-xl font-bold">404 Not Found</h2><p class="text-gray-500 mt-2">The view you requested does not exist.</p></div>`;
        }
    } catch (err) {
        container.innerHTML = `
            <div class="p-8 text-center max-w-lg mx-auto">
                <div class="text-red-500 flex justify-center mb-4 scale-150">${icons.alert}</div>
                <h2 class="text-xl font-bold mb-2">Error Loading View</h2>
                <div class="bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 p-4 rounded-lg text-sm text-left font-mono overflow-auto">
                    ${escapeHtml(err.message)}
                </div>
            </div>`;
    }
}

// --- Dashboard / Repos View ---
async function fetchRepos() {
    try {
        const repos = await apiFetch('/user/repos?per_page=100&sort=updated');
        state.repos = repos;
        state.filteredRepos = repos;
    } catch (e) {
        showToast('Failed to fetch repositories', 'error');
        throw e;
    }
}

function renderDashboard() {
    const reposHTML = state.filteredRepos.length > 0 
        ? state.filteredRepos.map(repo => `
            <a href="#/repo/${repo.owner.login}/${repo.name}" class="block group bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg p-4 hover:border-brand-500 hover:shadow-md transition-all">
                <div class="flex items-start justify-between gap-2 mb-2">
                    <h3 class="font-semibold text-brand-600 dark:text-brand-400 group-hover:underline truncate">${escapeHtml(repo.name)}</h3>
                    <span class="shrink-0 inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-gray-100 text-gray-800 dark:bg-gray-700 dark:text-gray-300">
                        ${repo.private ? 'Private' : 'Public'}
                    </span>
                </div>
                <p class="text-sm text-gray-500 dark:text-gray-400 mb-4 line-clamp-2 h-10">${escapeHtml(repo.description || 'No description provided.')}</p>
                <div class="flex items-center gap-4 text-xs text-gray-500 dark:text-gray-400">

                    <span class="flex items-center gap-1">${icons.star} ${repo.stargazers_count}</span>

        <div class="max-w-5xl mx-auto space-y-6">
            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                <h2 class="text-2xl font-bold">Your Repositories</h2>
                <div class="relative max-w-xs w-full">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                        ${icons.search}
                    </div>
                    <input type="text" id="repoSearch" placeholder="Find a repository..." 
                        class="w-full pl-9 pr-4 py-2 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none text-sm transition-colors">
                </div>
            </div>
            
            <div id="repo-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">

function setupDashboardEvents() {
    const searchInput = document.getElementById('repoSearch');
    if (searchInput) {
        searchInput.addEventListener('input', debounce((e) => {
            const query = e.target.value.toLowerCase();
            state.filteredRepos = state.repos.filter(r => 
                r.name.toLowerCase().includes(query) || 
                (r.description && r.description.toLowerCase().includes(query))
            );
            document.getElementById('repo-grid').innerHTML = renderDashboardGridContent();
        }, 300));
    }
}

function renderDashboardGridContent() {

    return state.filteredRepos.map(repo => `
        <a href="#/repo/${repo.owner.login}/${repo.name}" class="block group bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg p-4 hover:border-brand-500 hover:shadow-md transition-all">
            <div class="flex items-start justify-between gap-2 mb-2">
                <h3 class="font-semibold text-brand-600 dark:text-brand-400 group-hover:underline truncate">${escapeHtml(repo.name)}</h3>
                <span class="shrink-0 inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-gray-100 text-gray-800 dark:bg-gray-700 dark:text-gray-300">
                    ${repo.private ? 'Private' : 'Public'}
                </span>
            </div>
            <p class="text-sm text-gray-500 dark:text-gray-400 mb-4 line-clamp-2 h-10">${escapeHtml(repo.description || 'No description provided.')}</p>
            <div class="flex items-center gap-4 text-xs text-gray-500 dark:text-gray-400">
                ${repo.language ? `<span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-brand-500"></span> ${escapeHtml(repo.language)}</span>` : ''}
                <span class="flex items-center gap-1">${icons.star} ${repo.stargazers_count}</span>

// --- Repo & File Browser ---
async function loadRepoView(container) {
    const { owner, repo, branch, path } = state.currentRoute;
    
    // Breadcrumbs building
    let breadcrumbHtml = `<a href="#/" class="hover:text-brand-500">Dashboard</a> <span class="mx-1">/</span> <a href="#/repo/${owner}/${repo}" class="font-semibold text-gray-900 dark:text-gray-100 hover:text-brand-500">${escapeHtml(repo)}</a>`;
    
    if (branch) {
        const parts = path.split('/').filter(Boolean);
        let currPath = '';
        parts.forEach((p, i) => {
            currPath += (i > 0 ? '/' : '') + p;
            breadcrumbHtml += ` <span class="mx-1">/</span> <a href="#/repo/${owner}/${repo}/tree/${branch}/${currPath}" class="hover:text-brand-500">${escapeHtml(p)}</a>`;
        });
    }
    updateBreadcrumbs(breadcrumbHtml);

    // Fetch default branch if none specified
    let targetBranch = branch;
    let defaultBranch = '';
    try {
        const repoData = await apiFetch(`/repos/${owner}/${repo}`);
        defaultBranch = repoData.default_branch;
        if (!targetBranch) {
            window.location.hash = `/repo/${owner}/${repo}/tree/${defaultBranch}`;
            return; // let hashchange handle the render
        }
    } catch(e) { throw new Error(`Repo fetch failed: ${e.message}`); }

    // Fetch branches for dropdown
    const branches = await apiFetch(`/repos/${owner}/${repo}/branches?per_page=100`);
    
    // Construct header
    let html = `
        <div class="max-w-6xl mx-auto space-y-4">
            <div class="flex flex-wrap items-center justify-between gap-4 mb-6">
                <div class="flex items-center gap-2">
                    <span class="p-2 bg-gray-100 dark:bg-gray-800 rounded-md">${icons.book}</span>
                    <h2 class="text-xl font-bold">${escapeHtml(owner)} / ${escapeHtml(repo)}</h2>
                </div>
                
                <div class="relative inline-block text-left">
                    <select id="branchSelect" class="block w-full pl-8 pr-8 py-1.5 text-sm font-mono border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800 rounded-md focus:ring-brand-500 focus:border-brand-500 cursor-pointer appearance-none shadow-sm transition-colors">
                        ${branches.map(b => `<option value="${escapeHtml(b.name)}" ${b.name === targetBranch ? 'selected' : ''}>${escapeHtml(b.name)}</option>`).join('')}
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-2 text-gray-500">${icons.branch}</div>
                </div>
            </div>
            
            <div id="repo-content-area" class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg shadow-sm overflow-hidden">
                <div class="p-8 flex justify-center">${icons.history} <span class="ml-2 animate-pulse">Loading contents...</span></div>
            </div>
        </div>
    `;
    container.innerHTML = html;

    // Branch switcher event
    document.getElementById('branchSelect').addEventListener('change', (e) => {
        window.location.hash = `/repo/${owner}/${repo}/tree/${e.target.value}`;
    });

    // Fetch contents
    try {
        const encodedPath = encodeURIComponent(path); // handled by fetch, but good to be safe
        const apiPath = path ? `/repos/${owner}/${repo}/contents/${path}?ref=${targetBranch}` : `/repos/${owner}/${repo}/contents?ref=${targetBranch}`;
        const contents = await apiFetch(apiPath);
        
        const contentArea = document.getElementById('repo-content-area');
        
        if (Array.isArray(contents)) {
            // It's a directory
            contentArea.innerHTML = renderDirectoryTree(contents, owner, repo, targetBranch, path);
        } else {
            // It's a file
            contentArea.innerHTML = await renderFileViewer(contents, owner, repo, targetBranch);
            setupFileEvents(contents, owner, repo, targetBranch);
        }
    } catch(err) {
        document.getElementById('repo-content-area').innerHTML = `<div class="p-8 text-center text-red-500">Failed to load contents: ${escapeHtml(err.message)}</div>`;
    }
}

function renderDirectoryTree(items, owner, repo, branch, currentPath) {
    // Sort: directories first, then files
    items.sort((a, b) => {
        if (a.type === b.type) return a.name.localeCompare(b.name);
        return a.type === 'dir' ? -1 : 1;
    });

    let html = `
        <div class="bg-gray-50 dark:bg-gray-900 border-b border-gray-200 dark:border-gray-700 px-4 py-2 flex items-center justify-between text-sm font-medium">
            <div class="flex items-center gap-2">
                <span class="text-gray-500">${icons.folder}</span>
                <span>${currentPath ? escapeHtml(currentPath) : '/'}</span>
            </div>
        </div>
        <ul class="divide-y divide-gray-100 dark:divide-gray-700/50">
    `;

    // Parent dir link if not root
    if (currentPath) {
        const parentPath = currentPath.split('/').slice(0, -1).join('/');
        html += `
            <li class="hover:bg-gray-50 dark:hover:bg-gray-700/50 transition-colors">
                <a href="#/repo/${owner}/${repo}/tree/${branch}${parentPath ? '/' + parentPath : ''}" class="flex items-center gap-3 px-4 py-2.5">
                    <span class="text-blue-500">${icons.folder}</span>
                    <span class="font-medium">..</span>
                </a>
            </li>
        `;
    }

    items.forEach(item => {
        const isDir = item.type === 'dir';
        const icon = isDir ? icons.folder : icons.file;
        const linkPath = `/repo/${owner}/${repo}/tree/${branch}/${item.path}`;
        
        html += `
            <li class="hover:bg-gray-50 dark:hover:bg-gray-700/50 transition-colors">
                <a href="#${linkPath}" class="flex items-center gap-3 px-4 py-2.5 group">
                    <span class="${isDir ? 'text-blue-500' : 'text-gray-400 group-hover:text-gray-600 dark:group-hover:text-gray-300'}">${icon}</span>
                    <span class="truncate ${isDir ? 'font-medium' : 'text-gray-700 dark:text-gray-300'}">${escapeHtml(item.name)}</span>
                </a>
            </li>
        `;
    });

    if (items.length === 0) {
        html += `<li class="px-4 py-8 text-center text-gray-500">This directory is empty.</li>`;
    }

    html += `</ul>`;
    return html;
}

// --- File Viewer / Editor ---
async function renderFileViewer(fileData, owner, repo, branch) {
    const isImage = /\.(png|jpe?g|gif|webp|svg)$/i.test(fileData.name);
    const isMarkdown = /\.md$/i.test(fileData.name);
    
    // Reset editor state
    state.editor.content = fileData.content ? decodeBase64(fileData.content) : '';
    state.editor.originalSha = fileData.sha;
    state.editor.originalPath = fileData.path;
    state.editor.isEditing = false;
    // Default tab based on file type
    state.editor.activeTab = isImage || isMarkdown ? 'preview' : 'code';

    return `
        <div class="flex flex-col h-[calc(100vh-14rem)]">
            <!-- Toolbar -->
            <div class="flex items-center justify-between px-4 py-2 bg-gray-50 dark:bg-gray-900 border-b border-gray-200 dark:border-gray-700 shrink-0">
                <div class="flex items-center gap-4 text-sm font-medium text-gray-600 dark:text-gray-400">
                    <button class="tab-btn hover:text-gray-900 dark:hover:text-white px-2 py-1 border-b-2 ${state.editor.activeTab === 'code' ? 'border-brand-500 text-brand-600 dark:text-brand-400' : 'border-transparent'}" data-tab="code">${icons.code} <span class="ml-1">Code</span></button>
                    ${isMarkdown || isImage ? `<button class="tab-btn hover:text-gray-900 dark:hover:text-white px-2 py-1 border-b-2 ${state.editor.activeTab === 'preview' ? 'border-brand-500 text-brand-600 dark:text-brand-400' : 'border-transparent'}" data-tab="preview">${icons.eye} <span class="ml-1">Preview</span></button>` : ''}
                    <button class="tab-btn hover:text-gray-900 dark:hover:text-white px-2 py-1 border-b-2 ${state.editor.activeTab === 'history' ? 'border-brand-500 text-brand-600 dark:text-brand-400' : 'border-transparent'}" data-tab="history">${icons.history} <span class="ml-1">History</span></button>
                </div>
                
                <div class="flex items-center gap-2">
                    <span class="text-xs text-gray-500 mr-2 font-mono">${formatSize(fileData.size)}</span>
                    ${!isImage ? `<button id="editBtn" class="flex items-center gap-1.5 px-3 py-1.5 text-sm bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 rounded transition-colors" title="Edit file (e)">${icons.edit} Edit</button>` : ''}
                    <button id="deleteBtn" class="flex items-center gap-1.5 px-3 py-1.5 text-sm bg-red-50 text-red-600 dark:bg-red-900/20 dark:text-red-400 hover:bg-red-100 dark:hover:bg-red-900/40 rounded transition-colors">${icons.trash} Delete</button>
                </div>
            </div>

            <!-- Content Area -->
            <div id="fileContentArea" class="flex-1 overflow-auto bg-white dark:bg-gray-800 relative">
                ${generateTabContent(fileData, isImage, isMarkdown, owner, repo)}
            </div>

            <!-- Edit Controls (Hidden initially) -->
            <div id="editControls" class="hidden px-4 py-3 bg-gray-50 dark:bg-gray-900 border-t border-gray-200 dark:border-gray-700 shrink-0">
                <div class="flex flex-col sm:flex-row gap-3">
                    <input type="text" id="commitMsg" placeholder="Commit message (e.g., Update ${escapeHtml(fileData.name)})" class="flex-1 px-3 py-1.5 text-sm border border-gray-300 dark:border-gray-700 rounded bg-white dark:bg-gray-800 focus:ring-2 focus:ring-brand-500 outline-none">
                    <div class="flex gap-2 shrink-0">
                        <button id="cancelEditBtn" class="px-4 py-1.5 text-sm border border-gray-300 dark:border-gray-600 rounded hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">Cancel</button>
                        <button id="saveBtn" class="flex items-center gap-1.5 px-4 py-1.5 text-sm bg-brand-600 hover:bg-brand-500 text-white rounded transition-colors shadow-sm" title="Save changes (Ctrl+S)">${icons.save} Commit</button>
                    </div>
                </div>
            </div>
        </div>
    `;
}

function generateTabContent(fileData, isImage, isMarkdown, owner, repo) {
    if (state.editor.activeTab === 'code') {
        if (isImage) return `<div class="p-8 text-center text-gray-500">Binary file. Preview available in the Preview tab.</div>`;
        return `
            <textarea id="codeEditor" class="w-full h-full p-4 bg-transparent text-gray-800 dark:text-gray-200 font-mono text-sm resize-none outline-none focus:ring-2 focus:ring-inset focus:ring-brand-500 whitespace-pre" spellcheck="false" readonly>${escapeHtml(state.editor.content)}</textarea>
        `;
    } 
    else if (state.editor.activeTab === 'preview') {
        if (isImage) return `<div class="p-8 flex justify-center items-center h-full bg-checkered"><img src="data:image/${fileData.name.split('.').pop()};base64,${fileData.content.replace(/\n/g, '')}" class="max-w-full max-h-full shadow-lg rounded" alt="Preview"></div>`;
        if (isMarkdown) return `<div id="markdownPreview" class="p-6 md:p-8 max-w-4xl mx-auto markdown-body dark:text-gray-200">Loading markdown preview...</div>`;
        return `<div class="p-8 text-center text-gray-500">No preview available for this file type.</div>`;
    }
    else if (state.editor.activeTab === 'history') {
        return `<div id="historyList" class="p-4"><div class="flex justify-center">${icons.history} <span class="ml-2 animate-pulse">Loading history...</span></div></div>`;
    }
}

function setupFileEvents(fileData, owner, repo, branch) {
    const editBtn = document.getElementById('editBtn');
    const deleteBtn = document.getElementById('deleteBtn');
    const cancelBtn = document.getElementById('cancelEditBtn');
    const saveBtn = document.getElementById('saveBtn');
    const controls = document.getElementById('editControls');
    const editor = document.getElementById('codeEditor');
    const tabs = document.querySelectorAll('.tab-btn');
    const isMarkdown = /\.md$/i.test(fileData.name);
    const isImage = /\.(png|jpe?g|gif|webp|svg)$/i.test(fileData.name);

    // Tab switching
    tabs.forEach(tab => {
        tab.addEventListener('click', async (e) => {
            if (state.editor.isEditing) {
                if(!confirm("You have unsaved changes. Discard?")) return;
                toggleEditMode(false);
            }
            const targetTab = e.currentTarget.dataset.tab;
            state.editor.activeTab = targetTab;
            
            // Re-render UI
            const newHtml = await renderFileViewer(fileData, owner, repo, branch);
            document.getElementById('repo-content-area').innerHTML = newHtml;
            setupFileEvents(fileData, owner, repo, branch);
            
            // Post-render actions based on tab
            if (targetTab === 'preview' && isMarkdown) loadMarkdownPreview(owner, repo);
            if (targetTab === 'history') loadCommitHistory(owner, repo, fileData.path, branch);
        });
    });

    // Edit logic
    const toggleEditMode = (enable) => {
        state.editor.isEditing = enable;
        if (enable) {
            editor.removeAttribute('readonly');
            editor.classList.remove('bg-transparent');
            editor.classList.add('bg-white', 'dark:bg-gray-900');
            controls.classList.remove('hidden');
            editBtn.classList.add('hidden');
            editor.focus();
        } else {
            editor.setAttribute('readonly', 'true');
            editor.classList.add('bg-transparent');
            editor.classList.remove('bg-white', 'dark:bg-gray-900');
            controls.classList.add('hidden');
            editBtn.classList.remove('hidden');
            editor.value = state.editor.content; // revert
        }
    };

    if (editBtn) editBtn.addEventListener('click', () => {
        if(state.editor.activeTab !== 'code') {
            document.querySelector('[data-tab="code"]').click();
            setTimeout(() => toggleEditMode(true), 50);
        } else {
            toggleEditMode(true);
        }
    });
    
    if (cancelBtn) cancelBtn.addEventListener('click', () => toggleEditMode(false));

    // Save Logic
    if (saveBtn) saveBtn.addEventListener('click', async () => {
        const newContent = editor.value;
        const msg = document.getElementById('commitMsg').value.trim() || `Update ${fileData.name}`;
        
        saveBtn.disabled = true;
        saveBtn.innerHTML = `${icons.history} Saving...`;

        try {
            const body = {
                message: msg,
                content: encodeBase64(newContent),
                sha: state.editor.originalSha,
                branch: branch
            };
            const result = await apiFetch(`/repos/${owner}/${repo}/contents/${fileData.path}`, {
                method: 'PUT',
                body: JSON.stringify(body)
            });
            showToast('File updated successfully', 'success');
            
            // Update local state and reload
            fileData.sha = result.content.sha;
            fileData.content = body.content;
            state.editor.content = newContent;
            state.editor.originalSha = result.content.sha;
            
            toggleEditMode(false);
            saveBtn.innerHTML = `${icons.save} Commit`;
            saveBtn.disabled = false;
        } catch (e) {
            showToast(`Save failed: ${e.message}`, 'error');
            saveBtn.innerHTML = `${icons.save} Commit`;
            saveBtn.disabled = false;
        }
    });

    // Delete Logic
    if (deleteBtn) deleteBtn.addEventListener('click', async () => {
        const msg = prompt(`Enter commit message to delete ${fileData.name}:`, `Delete ${fileData.name}`);
        if (msg === null) return;

        try {
            await apiFetch(`/repos/${owner}/${repo}/contents/${fileData.path}`, {
                method: 'DELETE',
                body: JSON.stringify({ message: msg, sha: state.editor.originalSha, branch: branch })
            });
            showToast('File deleted', 'success');
            // Navigate up to parent folder
            const parentPath = fileData.path.split('/').slice(0, -1).join('/');
            window.location.hash = `/repo/${owner}/${repo}/tree/${branch}${parentPath ? '/' + parentPath : ''}`;
        } catch (e) {
            showToast(`Delete failed: ${e.message}`, 'error');
        }
    });

    // Load initial data for active tabs if needed
    if (state.editor.activeTab === 'preview' && isMarkdown) loadMarkdownPreview(owner, repo);
    if (state.editor.activeTab === 'history') loadCommitHistory(owner, repo, fileData.path, branch);
}

async function loadMarkdownPreview(owner, repo) {
    const el = document.getElementById('markdownPreview');
    if (!el) return;
    try {
        const rawText = state.editor.content;
        const res = await fetch(`${API_BASE}/markdown`, {
            method: 'POST',
            headers: {
                'Accept': 'application/vnd.github.v3+json',
                ...(state.token ? { 'Authorization': `token ${state.token}` } : {})
            },
            body: JSON.stringify({ text: rawText, mode: 'gfm', context: `${owner}/${repo}` })
        });
        if (!res.ok) throw new Error('Markdown rendering failed');
        el.innerHTML = await res.text();
    } catch (e) {
        el.innerHTML = `<div class="text-red-500">Preview error: ${escapeHtml(e.message)}</div>`;
    }
}

async function loadCommitHistory(owner, repo, path, branch) {
    const container = document.getElementById('historyList');
    if (!container) return;
    try {
        const commits = await apiFetch(`/repos/${owner}/${repo}/commits?path=${path}&sha=${branch}`);
        container.innerHTML = `
            <div class="space-y-4 max-w-4xl mx-auto">
                <h3 class="font-semibold text-lg mb-4">Commit History</h3>
                ${commits.map(c => `
                    <div class="flex gap-4 p-4 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg">
                        <img src="${c.author ? c.author.avatar_url : 'https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png'}" class="w-10 h-10 rounded-full bg-white">
                        <div class="flex-1 min-w-0">
                            <p class="font-medium text-gray-900 dark:text-gray-100 truncate" title="${escapeHtml(c.commit.message)}">${escapeHtml(c.commit.message)}</p>
                            <div class="flex items-center gap-2 mt-1 text-xs text-gray-500">
                                <span class="font-medium">${escapeHtml(c.commit.author.name)}</span>
                                <span>committed ${timeAgo(c.commit.author.date)}</span>
                            </div>
                        </div>
                        <div class="shrink-0 text-right">
                            <a href="${c.html_url}" target="_blank" class="text-xs font-mono text-brand-600 hover:underline bg-brand-50 dark:bg-brand-900/30 px-2 py-1 rounded">
                                ${c.sha.substring(0, 7)}
                            </a>
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
    } catch (e) {
        container.innerHTML = `<div class="text-red-500 p-4">Failed to load history: ${escapeHtml(e.message)}</div>`;
    }
}


// ==========================================
// 5. GLOBAL EVENTS & INIT
// ==========================================

function setupGlobalEvents() {
    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
        // Only run shortcuts if not typing in a normal input/textarea
        const tag = e.target.tagName.toLowerCase();
        const inInput = tag === 'input' || tag === 'textarea';

        if (state.currentRoute.view === 'repo' && state.currentRoute.path) {
            // 'e' to edit
            if (e.key === 'e' && !inInput && !e.ctrlKey && !e.metaKey) {
                e.preventDefault();
                const editBtn = document.getElementById('editBtn');
                if (editBtn) editBtn.click();
            }
            // Ctrl+S / Cmd+S to save
            if (e.key === 's' && (e.ctrlKey || e.metaKey)) {
                e.preventDefault();
                if (state.editor.isEditing) {
                    const saveBtn = document.getElementById('saveBtn');
                    if (saveBtn) saveBtn.click();
                }
            }
        }
    });
}

async function init() {
    if (state.token) {
        try {
            state.user = await apiFetch('/user');
            state.currentRoute = parseHash();
        } catch (e) {
            console.error("Auth check failed on init:", e);
            state.token = '';
            localStorage.removeItem(STORAGE_KEY);
        }
    }
    render();
}

// Start App
init();

</script>
