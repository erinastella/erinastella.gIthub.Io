    <script>
(function(){
const GH_API='https://api.github.com',MD_API='https://api.github.com/markdown';ace.config.set('basePath','https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.0/');
function getToken(){return localStorage.getItem('gh_pat')}function setToken(t){localStorage.setItem('gh_pat',t)}function clearToken(){localStorage.removeItem('gh_pat')}
function encodeBase64(s){const bytes=new TextEncoder().encode(s);let b='';bytes.forEach(c=>b+=String.fromCharCode(c));return btoa(b)}
function decodeBase64(s){try{const bytes=Uint8Array.from(atob(s),c=>c.charCodeAt(0));return new TextDecoder('utf-8').decode(bytes)}catch(e){return atob(s)}}
async function apiFetch(path,opts={}){const token=getToken();const headers={'Accept':'application/vnd.github+json','Content-Type':'application/json'};if(token)headers['Authorization']='Bearer '+token;const res=await fetch(GH_API+path,{...opts,headers:{...headers,...(opts.headers||{})}});if(!res.ok){const err=await res.json().catch(()=>({message:res.statusText}));throw new Error(err.message||'API error '+res.status)}if(res.status===204)return null;return res.json()}
async function renderMarkdown(text){const res=await fetch(MD_API,{method:'POST',headers:{'Content-Type':'application/json','Accept':'text/html'},body:JSON.stringify({text,mode:'markdown'})});if(!res.ok)throw new Error('Markdown render failed');return res.text()}
function showToast(msg,type='info'){const c=document.getElementById('toast-container');const colors={info:'bg-[#1a1f2b] border-[#30363d]',success:'bg-[#1a3a2a] border-[#3fb950]',error:'bg-[#3a1a1a] border-[#f85149]'};const t=document.createElement('div');t.className=`${colors[type]||colors.info} border rounded-lg px-4 py-3 mb-2 text-[#e6edf3] text-sm shadow-lg flex items-center gap-2`;t.innerHTML=`<svg class="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span>${msg}</span>`;c.appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity 0.3s';setTimeout(()=>t.remove(),300)},3500)}
function icon(id,cls='w-4 h-4'){return `<svg class="${cls}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><use href="#icon-${id}"/></svg>`}
function escapeHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function getAceMode(filename){const ext=(filename.split('.').pop()||'').toLowerCase();const m={js:'javascript',jsx:'javascript',ts:'typescript',tsx:'typescript',py:'python',rb:'ruby',go:'golang',rs:'rust',java:'java',c:'c_cpp',cpp:'c_cpp',h:'c_cpp',css:'css',html:'html',xml:'xml',json:'json',yaml:'yaml',yml:'yaml',md:'markdown',sql:'sql',sh:'sh',bash:'sh',php:'php',swift:'swift',kt:'kotlin',scala:'scala',vue:'html',svelte:'html',graphql:'graphqlschema',dockerfile:'dockerfile',toml:'toml',ini:'ini',cfg:'ini',conf:'ini'};return m[ext]||'text'}
function isCopyableFile(fn){const ext=(fn.split('.').pop()||'').toLowerCase();const bin=['png','jpg','jpeg','gif','bmp','ico','webp','mp4','webm','ogg','mp3','wav','flac','avi','mov','mkv','zip','tar','gz','rar','7z','apk','exe','dll','bin','pdf','doc','docx','xls','xlsx','ppt','pptx','tiff','psd','ai','eps'];return !bin.includes(ext)||ext==='svg'}
function isImage(fn){const ext=(fn.split('.').pop()||'').toLowerCase();return ['png','jpg','jpeg','gif','bmp','ico','webp','svg','tiff','psd','ai','eps'].includes(ext)}
function isAudio(fn){const ext=(fn.split('.').pop()||'').toLowerCase();return ['mp3','wav','ogg','flac','aac','m4a'].includes(ext)}
function isVideo(fn){const ext=(fn.split('.').pop()||'').toLowerCase();return ['mp4','webm','ogg','mov','avi','mkv'].includes(ext)}
function isMarkdown(fn){const ext=(fn.split('.').pop()||'').toLowerCase();return ['md','markdown','mdown','mkd'].includes(ext)}
let currentUser=null,appEl=document.getElementById('app'),aceInstances=[];
function destroyAceInstances(){aceInstances.forEach(e=>{try{e.destroy()}catch(e){}});aceInstances=[];document.querySelectorAll('.ace-editor').forEach(el=>{if(el._aceEditor){try{el._aceEditor.destroy()}catch(e){}delete el._aceEditor}})}
function createAceEditor(id,content,mode,readonly=true){destroyAceInstances();const el=document.getElementById(id);if(!el)return null;el.innerHTML='';const editor=ace.edit(el,{theme:'ace/theme/github_dark',mode:'ace/mode/'+mode,readOnly:readonly,showPrintMargin:false,highlightActiveLine:!readonly,fontSize:'13px',fontFamily:'JetBrains Mono,monospace',useWorker:false,maxLines:readonly?Infinity:undefined,minLines:readonly?10:20});editor.setValue(content||'',-1);editor.clearSelection();editor.renderer.setScrollMargin(10,10);editor.renderer.setPadding(16);if(readonly){editor.container.style.minHeight='300px';editor.renderer.$cursorLayer.element.style.display='none'}else{editor.container.style.minHeight='400px'}el._aceEditor=editor;aceInstances.push(editor);return editor}
function getEditorValue(id){const el=document.getElementById(id);if(el&&el._aceEditor)return el._aceEditor.getValue();return''}
async function loadUser(){if(!getToken())return null;try{currentUser=await apiFetch('/user');return currentUser}catch(e){clearToken();currentUser=null;return null}}
function bindDropdowns(){document.querySelectorAll('.dropdown').forEach(d=>{const btn=d.querySelector('.dropdown-btn'),content=d.querySelector('.dropdown-content');if(btn&&content){btn.addEventListener('click',e=>{e.stopPropagation();document.querySelectorAll('.dropdown.active').forEach(dd=>dd.classList.remove('active'));d.classList.toggle('active')})}});document.addEventListener('click',()=>{document.querySelectorAll('.dropdown.active').forEach(d=>d.classList.remove('active'))})}
function renderCustomSelect(id,placeholder,options,value,onChange,cls=''){const html=`<div class="custom-select relative ${cls}" id="${id}-wrapper"><div class="custom-select-btn" id="${id}-btn"><span id="${id}-text">${value||placeholder}</span><svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></div><div class="custom-select-dropdown" id="${id}-dropdown">${options.map(o=>`<div class="custom-select-item" data-value="${escapeHtml(o.value)}">${escapeHtml(o.label)}</div>`).join('')}</div></div>`;setTimeout(()=>{const btn=document.getElementById(id+'-btn'),dropdown=document.getElementById(id+'-dropdown'),text=document.getElementById(id+'-text');btn.addEventListener('click',e=>{e.stopPropagation();dropdown.classList.toggle('open')});dropdown.querySelectorAll('.custom-select-item').forEach(item=>{item.addEventListener('click',()=>{const val=item.dataset.value;text.textContent=item.textContent;dropdown.classList.remove('open');if(onChange)onChange(val)})});document.addEventListener('click',e=>{if(!e.target.closest('#'+id+'-wrapper'))dropdown.classList.remove('open')})},100);return html}

function renderFileTree(contents,owner,repo,branch,basePath,limitAll=false){if(!Array.isArray(contents))return'<p class="px-4 py-3 text-sm text-[#8b949e]">Empty directory</p>';const dirs=contents.filter(c=>c.type==='dir').sort((a,b)=>a.name.localeCompare(b.name));const files=contents.filter(c=>c.type==='file').sort((a,b)=>a.name.localeCompare(b.name));const all=[...dirs,...files];const showLimit=!limitAll&&all.length>7;const displayItems=showLimit?all.slice(0,7):all;let html=displayItems.map(item=>{const fullPath=basePath?basePath+'/'+item.name:item.name;if(item.type==='dir')return`<a href="#/${owner}/${repo}/tree/${branch}/${fullPath}" class="file-row flex items-center gap-2 px-4 py-2 text-sm text-[#58a6ff] hover:text-[#79c0ff] border-b border-[#30363d]/50 last:border-b-0 transition-colors">${icon('folder','w-4 h-4 text-[#58a6ff] flex-shrink-0')} ${escapeHtml(item.name)}</a>`;return`<a href="#/${owner}/${repo}/blob/${branch}/${fullPath}" class="file-row flex items-center gap-2 px-4 py-2 text-sm text-[#e6edf3] hover:text-[#c9d1d9] border-b border-[#30363d]/50 last:border-b-0 transition-colors">${icon('file','w-4 h-4 text-[#8b949e] flex-shrink-0')} ${escapeHtml(item.name)}</a>`}).join('');if(showLimit)html+=`<button class="show-all-files w-full text-center px-4 py-2 text-sm text-[#58a6ff] hover:bg-[#1f2428] transition-colors border-t border-[#30363d]" data-owner="${owner}" data-repo="${repo}" data-branch="${branch}" data-path="${basePath}">Show all ${all.length} files</button>`;return html}
function bindShowAllFiles(){document.querySelectorAll('.show-all-files').forEach(btn=>{btn.addEventListener('click',async function(){const o=this.dataset.owner,r=this.dataset.repo,b=this.dataset.branch,p=this.dataset.path;const contents=await apiFetch(`/repos/${o}/${r}/contents/${p}?ref=${b}`).catch(()=>[]);const container=this.parentElement;container.innerHTML=renderFileTree(contents,o,r,b,p,true);bindShowAllFiles()})})}

-2 border-b border-[#30363d] flex items-center gap-2 text-sm">${icon('branch','w-4 h-4')} <span class="font-semibold">${escapeHtml(defaultBranch)}</span></div><div id="file-tree-container">${renderFileTree(contents,owner,repoName,defaultBranch,'')}</div></div><div class="bg-[#161b22] border border-[#30363d] rounded-lg overflow-hidden mb-4"><div class="flex border-b border-[#30363d]"><button class="repo-tab px-4 py-2 text-sm font-medium border-b-2 border-[#d2991d] text-[#e6edf3]" data-tab="readme">README</button>${licenseName?`<button class="repo-tab px-4 py-2 text-sm text-[#8b949e] hover:text-[#e6edf3]" data-tab="license">License</button>`:''}</div><div id="panel-readme" class="p-4 sm:p-6"><div class="markdown-body" id="readme-content">${readmeHtml||'No README'}</div></div>${licenseName?`<div id="panel-license" class="hidden p-4 sm:p-6"><div class="markdown-body">${licenseHtml||'No license content'}</div></div>`:''}</div></div></div></div>`;bindHeaderEvents();bindDropdowns();bindShowAllFiles();addHeadingLinks(document.getElementById('readme-content'));if(licenseName)document.querySelectorAll('.repo-tab').forEach(t=>{t.addEventListener('click',()=>{document.querySelectorAll('.repo-tab').forEach(b=>{b.classList.remove('border-b-2','border-[#d2991d]','text-[#e6edf3]');b.classList.add('text-[#8b949e]')});t.classList.add('border-b-2','border-[#d2991d]','text-[#e6edf3]');t.classList.remove('text-[#8b949e]');document.getElementById('panel-readme').classList.toggle('hidden',t.dataset.tab!=='readme');document.getElementById('panel-license').classList.toggle('hidden',t.dataset.tab!=='license')})});document.getElementById('star-toggle-btn')?.addEventListener('click',async()=>{try{if(isStarred){await apiFetch(`/user/starred/${owner}/${repoName}`,{method:'DELETE'});isStarred=false}else{await apiFetch(`/user/starred/${owner}/${repoName}`,{method:'PUT'});isStarred=true}showToast(isStarred?'Starred!':'Unstarred','success')}catch(e){showToast(e.message,'error')}});document.getElementById('fork-btn')?.addEventListener('click',async()=>{try{const fork=await apiFetch(`/repos/${owner}/${repoName}/forks`,{method:'POST'});showToast('Forked to '+fork.full_name,'success');window.location.hash='#/'+fork.full_name;navigate()}catch(e){showToast(e.message,'error')}});document.getElementById('code-btn')?.addEventListener('click',()=>{const dropdown=document.getElementById('code-dropdown');if(dropdown)dropdown.classList.toggle('hidden')});}catch(e){appEl.innerHTML=`${renderHeader()}<div class="max-w-7xl mx-auto px-4 py-10 text-center"><p class="text-[#f85149]">Error: ${escapeHtml(e.message)}</p></div>`;bindHeaderEvents()}}
async function renderBlobPage(owner,repoName,branch,path){if(!currentUser){renderTokenScreen();return}destroyAceInstances();try{const contents=await apiFetch(`/repos/${owner}/${repoName}/contents/${path}?ref=${branch}`);const fileContent=decodeBase64(contents.content);const fileName=path.split('/').pop();const mode=getAceMode(fileName);const img=isImage(fileName);const audio=isAudio(fileName);const video=isVideo(fileName);const markdown=isMarkdown(fileName);const copyable=isCopyableFile(fileName);let previewHtml='';if(img)previewHtml=`<img src="https://raw.githubusercontent.com/${owner}/${repoName}/${branch}/${path}" class="max-w-full rounded">`;else if(audio)previewHtml=`<audio controls class="w-full max-w-md"><source src="https://raw.githubusercontent.com/${owner}/${repoName}/${branch}/${path}"></audio>`;else if(video)previewHtml=`<video controls class="max-w-full rounded"><source src="https://raw.githubusercontent.com/${owner}/${repoName}/${branch}/${path}"></video>`;else if(markdown){try{const mdHtml=await renderMarkdown(fileContent);previewHtml=`<div class="markdown-body">${mdHtml}</div>`}catch(e){previewHtml='<p class="text-sm text-[#8b949e]">Markdown preview failed.</p>'}}else{previewHtml='<div id="ace-preview" class="ace-editor readonly"></div>'}appEl.innerHTML=`${renderHeader()}<div class="max-w-7xl mx-auto px-3 sm:px-4 py-4"><div class="flex items-center justify-between mb-3"><div class="flex items-center gap-2 text-sm"><a href="#/${owner}/${repoName}" class="text-[#58a6ff] hover:underline">${escapeHtml(owner)}/${escapeHtml(repoName)}</a><span>/</span><span class="font-semibold">${escapeHtml(fileName)}</span></div><div class="dropdown relative"><button class="btn-secondary text-sm" id="ellipsis-btn">${icon('ellipsis','w-5 h-5')}</button><div class="dropdown-content absolute right-0 mt-2 w-56 bg-[#161b22] border border-[#30363d] rounded-lg shadow-xl py-1 z-50"><a href="#/${owner}/${repoName}/edit/${branch}/${path}" class="block px-4 py-2 text-sm hover:bg-[#1f2428]">${icon('edit','w-4 h-4')} Edit</a><a href="https://raw.githubusercontent.com/${owner}/${repoName}/${branch}/${path}" target="_blank" class="block px-4 py-2 text-sm hover:bg-[#1f2428]">${icon('link-external','w-4 h-4')} View raw</a>${copyable?`<button class="w-full text-left px-4 py-2 text-sm hover:bg-[#1f2428]" id="copy-content-btn">${icon('copy','w-4 h-4')} Copy</button>`:''}<a href="#/${owner}/${repoName}/delete/${branch}/${path}" class="block px-4 py-2 text-sm text-[#f85149] hover:bg-[#1f2428]">${icon('trash','w-4 h-4')} Delete</a></div></div></div><div class="bg-[#161b22] border border-[#30363d] rounded-lg overflow-hidden"><div class="flex border-b border-[#30363d]"><button class="blob-tab px-4 py-2 text-sm font-medium border-b-2 border-[#d2991d] text-[#e6edf3]" data-tab="preview">Preview</button>${!img&&!audio&&!video?`<button class="blob-tab px-4 py-2 text-sm text-[#8b949e]" data-tab="code">Code</button>`:''}</div><div id="blob-preview-panel" class="p-4">${previewHtml}</div>${!img&&!audio&&!video?`<div id="blob-code-panel" class="hidden"><div id="ace-blob-viewer" class="ace-editor readonly"></div></div>`:''}</div></div>`;bindHeaderEvents();bindDropdowns();if(!img&&!audio&&!video&&!markdown){setTimeout(()=>createAceEditor('ace-preview',fileContent,mode,true),100)}if(!img&&!audio&&!video){setTimeout(()=>createAceEditor('ace-blob-viewer',fileContent,mode,true),100)}document.querySelectorAll('.blob-tab').forEach(t=>{t.addEventListener('click',()=>{document.querySelectorAll('.blob-tab').forEach(b=>{b.classList.remove('border-b-2','border-[#d2991d]','text-[#e6edf3]');b.classList.add('text-[#8b949e]')});t.classList.add('border-b-2','border-[#d2991d]','text-[#e6edf3]');t.classList.remove('text-[#8b949e]');document.getElementById('blob-preview-panel').classList.toggle('hidden',t.dataset.tab!=='preview');const codePanel=document.getElementById('blob-code-panel');if(codePanel)codePanel.classList.toggle('hidden',t.dataset.tab!=='code')})});document.getElementById('copy-content-btn')?.addEventListener('click',()=>{navigator.clipboard.writeText(fileContent);showToast('Copied!','success')})}catch(e){appEl.innerHTML=`${renderHeader()}<div class="max-w-7xl mx-auto px-4 py-10 text-center"><p class="text-[#f85149]">Error: ${escapeHtml(e.message)}</p></div>`;bindHeaderEvents()}}
async function renderEditPage(owner,repoName,branch,path){if(!currentUser){renderTokenScreen();return}destroyAceInstances();try{const contents=await apiFetch(`/repos/${owner}/${repoName}/contents/${path}?ref=${branch}`);const fileContent=decodeBase64(contents.content);const sha=contents.sha;const fileName=path.split('/').pop();const mode=getAceMode(fileName);appEl.innerHTML=`${renderHeader()}<div class="max-w-5xl mx-auto px-3 py-4"><div class="bg-[#161b22] border border-[#30363d] rounded-lg p-4 mb-4"><div class="flex items-center gap-4 mb-3"><label class="text-sm font-medium">Filename:</label><input type="text" id="filename-input" class="flex-1" value="${escapeHtml(fileName)}"><label class="flex items-center gap-2 text-sm"><input type="checkbox" id="wrap-checkbox" class="custom-checkbox"> Wrap</label></div><div class="flex items-center gap-3"><button id="commit-btn" class="btn-primary">Commit changes</button><a href="#/${owner}/${repoName}/blob/${branch}/${path}" class="btn-secondary">Cancel</a></div></div><div class="bg-[#161b22] border border-[#30363d] rounded-lg p-4"><div id="ace-editor-edit" class="ace-editor"></div></div></div><div id="commit-modal" class="modal-overlay hidden"><div class="bg-[#161b22] border border-[#30363d] rounded-lg p-6 w-full max-w-md"><h3 class="text-lg font-semibold mb-4">Commit changes</h3><input type="text" id="commit-message" placeholder="Commit message" class="w-full mb-3"><input type="text" id="commit-branch" placeholder="Branch" class="w-full mb-3" value="${escapeHtml(branch)}"><div class="flex justify-end gap-2"><button id="modal-commit-btn" class="btn-primary">Commit</button><button id="modal-cancel-btn" class="btn-secondary">Cancel</button></div></div></div>`;bindHeaderEvents();setTimeout(()=>createAceEditor('ace-editor-edit',fileContent,mode,false),100);document.getElementById('commit-btn').addEventListener('click',()=>{document.getElementById('commit-modal').classList.remove('hidden')});document.getElementById('modal-cancel-btn').addEventListener('click',()=>{document.getElementById('commit-modal').classList.add('hidden')});document.getElementById('modal-commit-btn').addEventListener('click',async()=>{const newContent=getEditorValue('ace-editor-edit');const message=document.getElementById('commit-message').value.trim();const newBranch=document.getElementById('commit-branch').value.trim();const newFilename=document.getElementById('filename-input').value.trim();if(!message)return showToast('Enter a commit message','error');if(!newBranch)return showToast('Enter a branch','error');try{const newPath=path.substring(0,path.lastIndexOf('/')+1)+newFilename;await apiFetch(`/repos/${owner}/${repoName}/contents/${path}`,{method:'PUT',body:JSON.stringify({message,content:encodeBase64(newContent),sha,branch:newBranch})});if(newPath!==path){await apiFetch(`/repos/${owner}/${repoName}/contents/${path}`,{method:'DELETE',body:JSON.stringify({message:'Rename file',sha,branch:newBranch})});await apiFetch(`/repos/${owner}/${repoName}/contents/${newPath}`,{method:'PUT',body:JSON.stringify({message:'Rename file',content:encodeBase64(newContent),branch:newBranch})})}showToast('Committed!','success');window.location.hash=`#/${owner}/${repoName}/blob/${newBranch}/${newPath}`;navigate()}catch(e){showToast(e.message,'error')}})}catch(e){appEl.innerHTML=`${renderHeader()}<div class="max-w-7xl mx-auto px-4 py-10 text-center"><p class="text-[#f85149]">Error: ${escapeHtml(e.message)}</p></div>`;bindHeaderEvents()}}
async function renderNotificationsPage(){if(!currentUser){renderTokenScreen();return}destroyAceInstances();try{const notifs=await apiFetch('/notifications?all=true&per_page=50');appEl.innerHTML=`${renderHeader()}<div class="max-w-5xl mx-auto px-3 py-4"><h2 class="text-lg font-semibold mb-4">Notifications</h2><div class="space-y-2">${notifs.map(n=>`<div class="bg-[#161b22] border border-[#30363d] rounded-lg p-4 flex items-center justify-between"><div><a href="${n.subject.url.replace('api.github.com/repos','').replace('/pulls/','/pull/')}" target="_blank" class="text-[#58a6ff] font-semibold text-sm hover:underline">${escapeHtml(n.subject.title)}</a><p class="text-xs text-[#8b949e]">${n.reason} · ${new Date(n.updated_at).toLocaleDateString()}</p></div><button class="btn-secondary text-xs mark-read-btn" data-id="${n.id}">Mark read</button></div>`).join('')}</div></div>`;bindHeaderEvents();document.querySelectorAll('.mark-read-btn').forEach(b=>{b.addEventListener('click',async()=>{try{await apiFetch(`/notifications/threads/${b.dataset.id}`,{method:'PATCH',body:JSON.stringify({read:true})});b.textContent='Read';b.disabled=true}catch(e){showToast(e.message,'error')}})})}catch(e){appEl.innerHTML=`${renderHeader()}<div class="max-w-7xl mx-auto px-4 py-10 text-center"><p class="text-[#f85149]">Error: ${escapeHtml(e.message)}</p></div>`;bindHeaderEvents()}}
async function renderDiscoverPage(){if(!currentUser){renderTokenScreen();return}destroyAceInstances();const repos=await apiFetch('/search/repositories?q=stars:>1000+created:>2023-01-01&sort=stars&order=desc&per_page=30').catch(()=>({items:[]}));appEl.innerHTML=`${renderHeader()}<div class="max-w-7xl mx-auto px-3 py-4"><h2 class="text-lg font-semibold mb-4">Trending repositories</h2><div class="space-y-3">${repos.items.map(repo=>`<div class="bg-[#161b22] border border-[#30363d] rounded-lg p-4"><div class="flex items-center gap-2 mb-1">${icon('repo','w-4 h-4 text-[#8b949e]')}<a href="#/${repo.full_name}" class="text-[#58a6ff] font-semibold text-sm hover:underline">${escapeHtml(repo.full_name)}</a></div><p class="text-xs text-[#8b949e]">${escapeHtml(repo.description||'')}</p><div class="flex items-center gap-3 text-xs text-[#8b949e] mt-2">${repo.language?`<span>${escapeHtml(repo.language)}</span>`:''}<span>${icon('star','w-3 h-3')} ${repo.stargazers_count}</span></div></div>`).join('')}</div></div>`;bindHeaderEvents()}
async function renderSettingsProfile(){if(!currentUser){renderTokenScreen();return}destroyAceInstances();appEl.innerHTML=`${renderHeader()}<div class="max-w-2xl mx-auto px-3 py-4"><h2 class="text-lg font-semibold mb-4">Profile Settings</h2><div class="bg-[#161b22] border border-[#30363d] rounded-lg p-6 space-y-4"><div><label class="text-sm mb-1 block">Display name</label><input type="text" id="name-input" class="w-full" value="${escapeHtml(currentUser.name||'')}" placeholder="Your name"></div><div><label class="text-sm mb-1 block">Bio</label><input type="text" id="bio-input" class="w-full" value="${escapeHtml(currentUser.bio||'')}" placeholder="Short bio"></div><div><label class="text-sm mb-1 block">Twitter username</label><input type="text" id="twitter-input" class="w-full" value="${escapeHtml(currentUser.twitter_username||'')}" placeholder="Twitter handle"></div><button id="save-profile-btn" class="btn-primary">Save profile</button><p id="profile-msg" class="text-sm hidden"></p></div></div>`;bindHeaderEvents();document.getElementById('save-profile-btn').addEventListener('click',async()=>{const name=document.getElementById('name-input').value.trim();const bio=document.getElementById('bio-input').value.trim();const twitter=document.getElementById('twitter-input').value.trim();try{await apiFetch('/user',{method:'PATCH',body:JSON.stringify({name,bio,twitter_username:twitter})});showToast('Profile updated','success')}catch(e){showToast(e.message,'error')}})}
function parseHash(){const hash=window.location.hash.slice(1)||'/dashboard';const[path,qs]=hash.split('?');const query={};if(qs){qs.split('&').forEach(p=>{const[k,v]=p.split('=');query[decodeURIComponent(k)]=decodeURIComponent(v||'')})}const parts=path.split('/').filter(Boolean);return{path,parts,query}}
async function navigate(){const{parts,query}=parseHash();if(!getToken()&&parts.length){renderTokenScreen();return}if(!currentUser&&getToken()){const u=await loadUser();if(!u){renderTokenScreen();return}}if(!currentUser&&!getToken()){renderTokenScreen();return}destroyAceInstances();if(!parts.length||parts[0]==='dashboard')await renderDashboard();else if(parts[0]==='new')await renderNewRepoPage();else if(parts[0]==='search')await renderSearchPage(query.q||'');else if(parts[0]==='profile')await renderProfilePage();else if(parts[0]==='discover')await renderDiscoverPage();else if(parts[0]==='notifications')await renderNotificationsPage();else if(parts[0]==='settings'&&parts[1]==='profile')await renderSettingsProfile();else if(parts[0]==='u'&&parts.length===2)await renderUserPage(parts[1]);else if(parts[0]==='orgs'&&parts.length===2)await renderOrgPage(parts[1]);else if(parts[0]==='orgs'&&parts[2]==='new')await renderOrgNewPage(parts[1]);else if(parts.length===2)await renderRepoPage(parts[0],parts[1]);else if(parts[2]==='issues')await renderIssuesPage(parts[0],parts[1]);else if(parts[2]==='blob')await renderBlobPage(parts[0],parts[1],parts[3],parts.slice(4).join('/'));else if(parts[2]==='tree')await renderTreePage(parts[0],parts[1],parts[3],parts.slice(4).join('/'));else if(parts[2]==='edit')await renderEditPage(parts[0],parts[1],parts[3],parts.slice(4).join('/'));else if(parts[2]==='delete')await renderDeletePage(parts[0],parts[1],parts[3],parts.slice(4).join('/'));else if(parts[2]==='new')await renderNewFilePage(parts[0],parts[1],parts[3],parts.slice(4).join('/'));else if(parts[2]==='upload')await renderUploadPage(parts[0],parts[1],parts[3],parts.slice(4).join('/'));else if(parts[2]==='settings')await renderSettingsPage(parts[0],parts[1]);else appEl.innerHTML=`${renderHeader()}<div class="max-w-7xl mx-auto px-4 py-10 text-center"><p>Page not found</p></div>`;window.scrollTo(0,0)}
window.addEventListener('hashchange',navigate);
async function init(){if(getToken()){const u=await loadUser();if(u){await navigate();return}}renderTokenScreen()}
init();
})();
</script>
