<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Client</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body {
    background-color: #0d1117;
    color: #c9d1d9;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
}
.gh-btn {
    background-color: #21262d;
    border: 1px solid #30363d;
    color: #c9d1d9;
    border-radius: 6px;
    padding: 3px 12px;
    font-size: 14px;
    font-weight: 500;
    line-height: 20px;
    cursor: pointer;
    transition: 0.2s cubic-bezier(0.3, 0, 0.5, 1);
}
.gh-btn:hover {
    background-color: #30363d;
    border-color: #8b949e;
}
.gh-btn-primary {
    background-color: #238636;
    border-color: rgba(240, 246, 252, 0.1);
    color: #ffffff;
}
.gh-btn-primary:hover {
    background-color: #2ea043;
    border-color: rgba(240, 246, 252, 0.1);
}
.gh-btn-danger {
    color: #f85149;
}
.gh-btn-danger:hover {
    background-color: #b31d28;
    color: #ffffff;
    border-color: rgba(240, 246, 252, 0.1);
}
.gh-input {
    background-color: #0d1117;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 5px 12px;
    color: #c9d1d9;
    font-size: 14px;
}
.gh-input:focus {
    outline: none;
    border-color: #58a6ff;
    box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.3);
}
.markdown-body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    font-size: 16px;
    line-height: 1.5;
    word-wrap: break-word;
    color: #c9d1d9;
}
.markdown-body h1, .markdown-body h2 {
    border-bottom: 1px solid #21262d;
    padding-bottom: 0.3em;
}
.markdown-body h1, .markdown-body h2, .markdown-body h3, .markdown-body h4, .markdown-body h5, .markdown-body h6 {
    margin-top: 24px;
    margin-bottom: 16px;
    font-weight: 600;
    line-height: 1.25;
}
.markdown-body a {
    color: #58a6ff;
    text-decoration: none;
}
.markdown-body a:hover {
    text-decoration: underline;
}
.markdown-body pre {
    background-color: #161b22;
    border-radius: 6px;
    padding: 16px;
    overflow: auto;
}
.markdown-body code {
    background-color: rgba(110, 118, 129, 0.4);
    border-radius: 6px;
    padding: 0.2em 0.4em;
    font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace;
    font-size: 85%;
}
.markdown-body pre code {
    background-color: transparent;
    padding: 0;
    font-size: 100%;
}
.markdown-body p, .markdown-body blockquote, .markdown-body ul, .markdown-body ol, .markdown-body dl, .markdown-body table, .markdown-body pre, .markdown-body details {
    margin-top: 0;
    margin-bottom: 16px;
}
.markdown-body ul, .markdown-body ol {
    padding-left: 2em;
}
</style>
</head>
<body class="flex flex-col min-h-screen">
<div id="app" class="flex-grow flex flex-col"></div>

function sanitize(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

function encodeB64(str) {
    return btoa(String.fromCharCode(...new Uint8Array(new TextEncoder().encode(str))));
}

function decodeB64(b64) {
    return new TextDecoder().decode(new Uint8Array(atob(b64).split('').map(c => c.charCodeAt(0))));
}

async function api(path, options = {}) {
    const headers = {
        'Accept': 'application/vnd.github+json',
        'X-GitHub-Api-Version': '2022-11-28',
        ...options.headers
    };
    if (state.pat) headers['Authorization'] = `Bearer ${state.pat}`;
    
    const res = await fetch(path.startsWith('http') ? path : `https://api.github.com${path}`, {
        ...options,
        headers
    });
    
    if (res.status === 204) return null;
    if (!res.ok) throw new Error((await res.json().catch(()=>({}))).message || `Error ${res.status}`);
    return res.json();
}

async function renderRepo(owner, repo, branch, path) {
    const app = document.getElementById('app');
    app.innerHTML = renderHeader() + `<div class="p-6">Loading...</div>`;
    
    try {
        const repoData = await api(`/repos/${owner}/${repo}`);
        const defaultBranch = branch || repoData.default_branch;
        const currentPath = path || '';
        
        const headerHtml = await getRepoHeader(owner, repo, 'code');
        
        const treeApi = `/repos/${owner}/${repo}/contents/${currentPath}?ref=${defaultBranch}`;
        let contents = [];
        try { contents = await api(treeApi); } catch(e) { if(!e.message.includes('404')) throw e; }
        
        if (!Array.isArray(contents)) contents = [contents]; 
        
        contents.sort((a,b) => {
            if (a.type === 'dir' && b.type !== 'dir') return -1;
            if (a.type !== 'dir' && b.type === 'dir') return 1;
            return a.name.localeCompare(b.name);
        });

        let filesHtml = `
        <div class="border border-[#30363d] rounded-md bg-[#0d1117] mb-4">
            <div class="bg-[#161b22] px-4 py-3 border-b border-[#30363d] flex items-center justify-between rounded-t-md">
                <div class="flex items-center gap-3 font-semibold text-sm">
                    ${currentPath ? `<a href="#/${owner}/${repo}/tree/${defaultBranch}/${currentPath.split('/').slice(0,-1).join('/')}" class="text-blue-400 hover:underline">..</a> / ${sanitize(currentPath)}` : sanitize(owner)}
                </div>
            </div>`;
        
        if (contents.length && contents[0].type) {

                <div class="flex items-center gap-3 px-4 py-2 border-b border-[#21262d] text-sm hover:bg-[#161b22]">
                    <div class="w-4 text-gray-500">${f.type === 'dir' ? ICONS.folder : ICONS.file}</div>

            `).join('');
        } else {
            filesHtml += `<div class="p-4 text-gray-400 text-center">Repository is empty or file not found.</div>`;
        }
        filesHtml += `</div>`;

        let readmeHtml = '';
        if (!currentPath) {
            try {
                const readmeData = await api(`/repos/${owner}/${repo}/readme`);
                const rawMd = decodeB64(readmeData.content);
                const html = await fetch('https://api.github.com/markdown', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${state.pat}` },
                    body: JSON.stringify({ text: rawMd })
                }).then(r => r.text());
                readmeHtml = `
                <div class="border border-[#30363d] rounded-md bg-[#0d1117] mt-4">
                    <div class="bg-[#161b22] px-4 py-3 border-b border-[#30363d] font-semibold flex items-center gap-2 rounded-t-md">
                        ${ICONS.book} README.md

            } catch (e) { }
        }

        app.innerHTML = renderHeader() + headerHtml + `
        <div class="max-w-6xl mx-auto w-full p-6">
            <div class="flex items-center justify-between mb-4">
                <div class="relative">
                    <button class="gh-btn flex items-center gap-2 bg-[#21262d]">${ICONS.fork} ${sanitize(defaultBranch)} ${ICONS.chevronDown}</button>
                </div>

async function renderUpload(owner, repo, branch, basePath) {
    const app = document.getElementById('app');
    const headerHtml = await getRepoHeader(owner, repo, 'code');
    
    window.handleFiles = async (files) => {
        const msg = document.getElementById('commit-msg').value || 'Upload files';
        const btn = document.getElementById('upload-btn');
        btn.disabled = true;
        btn.textContent = 'Uploading...';
        
        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            const fullPath = basePath ? `${basePath}/${file.name}` : file.name;
            const reader = new FileReader();
            
            await new Promise((resolve) => {
                reader.onload = async (e) => {
                    const base64 = e.target.result.split(',')[1];
                    let sha = undefined;
                    try {
                        const existing = await api(`/repos/${owner}/${repo}/contents/${fullPath}?ref=${branch}`);
                        sha = existing.sha;
                    } catch(e) {}
                    
                    try {
                        await api(`/repos/${owner}/${repo}/contents/${fullPath}`, {
                            method: 'PUT',
                            body: JSON.stringify({ message: msg, content: base64, branch, sha })
                        });
                    } catch(e) { alert('Error uploading ' + file.name); }
                    resolve();
                };
                reader.readAsDataURL(file);
            });
        }
        window.location.hash = `#/${owner}/${repo}/tree/${branch}/${basePath}`;
    };

    app.innerHTML = renderHeader() + headerHtml + `
    <div class="max-w-6xl mx-auto w-full p-6">
        <h2 class="text-xl font-semibold mb-4">Upload files</h2>
        <div class="border border-[#30363d] border-dashed rounded-md bg-[#0d1117] p-12 text-center mb-6"
             ondragover="event.preventDefault(); this.style.borderColor='#58a6ff';"
             ondragleave="event.preventDefault(); this.style.borderColor='#30363d';"
             ondrop="event.preventDefault(); this.style.borderColor='#30363d'; document.getElementById('file-input').files = event.dataTransfer.files;">
            <div class="text-gray-500 mb-2 flex justify-center">${ICONS.upload}</div>
            <p>Drag files here to add them to your repository</p>
            <p class="text-gray-500 text-sm mt-2">or</p>

            <button onclick="document.getElementById('file-input').click()" class="gh-btn mt-2">choose your files</button>
            <div id="file-list" class="mt-4 text-sm text-[#58a6ff]"></div>
        </div>
        <div class="bg-[#161b22] border border-[#30363d] rounded-md p-4">
            <h3 class="font-semibold mb-3">Commit changes</h3>
            <input type="text" id="commit-msg" class="gh-input w-full bg-[#0d1117] border-[#30363d] mb-4" placeholder="Add files via upload">
            <button id="upload-btn" onclick="handleFiles(document.getElementById('file-input').files)" class="gh-btn-primary">Commit changes</button>
            <a href="#/${owner}/${repo}" class="gh-btn ml-2">Cancel</a>
        </div>
    </div>`;
}

                <a href="#" class="px-3 py-2 text-gray-400 hover:bg-[#161b22] rounded">Pages</a>
            </nav>
        </div>
        <div class="w-3/4">
            <h2 class="text-2xl font-semibold mb-4 border-b border-[#30363d] pb-2">General</h2>
            
            <div class="mb-8">
                <label class="block font-semibold mb-2">Repository name</label>
                <div class="flex gap-2 mb-4">
                    <input type="text" id="r-name" value="${sanitize(r.name)}" class="gh-input bg-[#0d1117] border-[#30363d] w-64">
                </div>
                <label class="block font-semibold mb-2 mt-4">Description</label>
                <input type="text" id="r-desc" value="${sanitize(r.description || '')}" class="gh-input bg-[#0d1117] border-[#30363d] w-full mb-4">
                <label class="flex items-center gap-2 mb-4 cursor-pointer">
                    <input type="checkbox" id="r-priv" ${r.private ? 'checked' : ''}> Make this repository private
                </label>
                <button onclick="updateRepo()" class="gh-btn-primary">Save changes</button>
            </div>

            <h2 class="text-2xl font-semibold mb-4 border-b border-red-500 pb-2 text-red-500">Danger Zone</h2>
            <div class="border border-red-500 rounded-md p-4">
                <div class="flex items-center justify-between">
                    <div>
                        <h4 class="font-semibold text-white">Delete this repository</h4>
                        <p class="text-sm text-gray-400">Once you delete a repository, there is no going back. Please be certain.</p>
                    </div>
                    <button onclick="deleteRepo()" class="gh-btn gh-btn-danger">Delete repository</button>
                </div>
            </div>
        </div>
    </div>`;
}

async function renderSearch(query) {
    const app = document.getElementById('app');
    app.innerHTML = renderHeader() + `<div class="p-6">Searching...</div>`;
    
    try {
        const [repos, users] = await Promise.all([
            api(`/search/repositories?q=${encodeURIComponent(query)}&per_page=15`),
            api(`/search/users?q=${encodeURIComponent(query)}&per_page=10`)
        ]);

        let reposHtml = repos.items.map(r => `
            <div class="py-4 border-b border-[#30363d]">
                <div class="flex items-center gap-2 text-lg">
                    <span class="text-gray-500">${ICONS.repo}</span>
                    <a href="#/${r.full_name}" class="text-[#58a6ff] hover:underline font-semibold">${sanitize(r.full_name)}</a>
                </div>
                <p class="text-gray-400 text-sm mt-1 mb-2">${sanitize(r.description || '')}</p>
                <div class="flex gap-4 text-xs text-gray-500 items-center">
                    ${r.language ? `<span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-blue-500"></span>${sanitize(r.language)}</span>` : ''}
                    <span class="flex items-center gap-1">${ICONS.star} ${r.stargazers_count}</span>
                    <span>Updated ${new Date(r.updated_at).toLocaleDateString()}</span>
                </div>
            </div>
        `).join('');

        app.innerHTML = renderHeader() + `
        <div class="max-w-6xl mx-auto w-full p-6 flex gap-6">
            <div class="w-1/4">
                <nav class="flex flex-col gap-1 border border-[#30363d] rounded-md overflow-hidden">
                    <a href="#" class="px-4 py-2 bg-[#161b22] border-l-2 border-[#f78166] text-white flex justify-between">Repositories <span class="bg-[#30363d] px-2 rounded-full text-xs py-0.5">${repos.total_count}</span></a>
                    <a href="#" class="px-4 py-2 text-gray-400 hover:bg-[#161b22] flex justify-between border-t border-[#30363d]">Users <span class="bg-[#30363d] px-2 rounded-full text-xs py-0.5">${users.total_count}</span></a>
                </nav>
            </div>
            <div class="w-3/4">
                <h2 class="text-xl font-semibold mb-4 border-b border-[#30363d] pb-2">${repos.total_count} repository results</h2>
                ${reposHtml}
            </div>
        </div>`;
    } catch (e) {
        app.innerHTML = renderHeader() + `<div class="p-6 text-red-400">Error: ${sanitize(e.message)}</div>`;
    }
}

async function renderProfile(username = null) {
    const app = document.getElementById('app');
    const targetUser = username || state.user.login;
    app.innerHTML = renderHeader() + `<div class="p-6">Loading profile...</div>`;
    
    try {
        const [u, repos] = await Promise.all([
            api(`/users/${targetUser}`),
            api(`/users/${targetUser}/repos?sort=updated&per_page=30`)
        ]);

        let reposHtml = repos.map(r => `
            <div class="py-4 border-b border-[#30363d] flex justify-between items-start">
                <div>
                    <h3 class="text-xl text-[#58a6ff] font-semibold hover:underline"><a href="#/${r.full_name}">${sanitize(r.name)}</a></h3>
                    <p class="text-sm text-gray-400 mt-2 mb-3">${sanitize(r.description || '')}</p>
                    <div class="flex gap-4 text-xs text-gray-500 items-center">
                        ${r.language ? `<span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-yellow-500"></span>${sanitize(r.language)}</span>` : ''}
                        ${r.stargazers_count ? `<span class="flex items-center gap-1">${ICONS.star} ${r.stargazers_count}</span>` : ''}
                        <span>Updated ${new Date(r.updated_at).toLocaleDateString()}</span>
                    </div>
                </div>
                <button class="gh-btn flex items-center gap-1">${ICONS.star} Star</button>
            </div>
        `).join('');

        app.innerHTML = renderHeader() + `
        <div class="max-w-6xl mx-auto w-full p-6 flex gap-8">
            <div class="w-1/4">
                <img src="${u.avatar_url}" class="w-full rounded-full border border-[#30363d] mb-4">
                <h1 class="text-2xl font-bold text-white">${sanitize(u.name || u.login)}</h1>
                <h2 class="text-xl text-gray-400 font-light mb-4">${sanitize(u.login)}</h2>
                ${username && username !== state.user.login ? `<button class="gh-btn w-full mb-4">Follow</button>` : `<button class="gh-btn w-full mb-4">Edit profile</button>`}
                <p class="mb-4">${sanitize(u.bio || '')}</p>
                <div class="text-sm text-gray-400 flex gap-4">
                    <span><strong class="text-white">${u.followers}</strong> followers</span>
                    <span><strong class="text-white">${u.following}</strong> following</span>
                </div>
            </div>
            <div class="w-3/4">
                <nav class="flex gap-4 mb-4 border-b border-[#30363d]">
                    <a href="#" class="pb-2 border-b-2 border-[#f78166] text-white font-medium flex items-center gap-2">${ICONS.repo} Repositories <span class="bg-[#30363d] px-2 rounded-full text-xs">${u.public_repos}</span></a>
                </nav>
                <div class="flex gap-2 mb-4">
                    <input type="text" class="gh-input bg-[#0d1117] border-[#30363d] flex-grow" placeholder="Find a repository...">
                    ${username ? '' : `<a href="#/new" class="gh-btn-primary flex items-center gap-1">${ICONS.repo} New</a>`}
                </div>
                ${reposHtml}
            </div>
        </div>`;
    } catch (e) {
        app.innerHTML = renderHeader() + `<div class="p-6 text-red-400">Error: ${sanitize(e.message)}</div>`;
    }
}

async function renderNewRepo() {
    const app = document.getElementById('app');
    
    window.createNewRepo = async () => {
        try {
            const res = await api(`/user/repos`, {
                method: 'POST',
                body: JSON.stringify({
                    name: document.getElementById('n-name').value,
                    description: document.getElementById('n-desc').value,
                    private: document.getElementById('n-priv').checked,
                    auto_init: document.getElementById('n-init').checked
                })
            });
            window.location.hash = `#/${res.full_name}`;
        } catch(e) { alert(e.message); }
    };

    app.innerHTML = renderHeader() + `
    <div class="max-w-3xl mx-auto w-full p-8 mt-8 bg-[#0d1117]">
        <h2 class="text-2xl font-semibold mb-2 border-b border-[#30363d] pb-4">Create a new repository</h2>
        <p class="text-sm text-gray-400 mb-6 mt-2">A repository contains all project files, including the revision history.</p>
        
        <div class="mb-4">
            <label class="block font-semibold mb-2">Repository name *</label>
            <input type="text" id="n-name" class="gh-input bg-[#0d1117] border-[#30363d] w-64 block">
        </div>
        
        <div class="mb-6">
            <label class="block font-semibold mb-2">Description <span class="text-gray-400 font-normal">(optional)</span></label>
            <input type="text" id="n-desc" class="gh-input bg-[#0d1117] border-[#30363d] w-full block">
        </div>
        
        <div class="border-t border-b border-[#30363d] py-4 mb-6 space-y-4">
            <label class="flex items-start gap-2 cursor-pointer">
                <input type="radio" name="visibility" checked class="mt-1">
                <div>
                    <div class="font-semibold flex items-center gap-2">${ICONS.book} Public</div>
                    <div class="text-sm text-gray-400">Anyone on the internet can see this repository.</div>
                </div>
            </label>
            <label class="flex items-start gap-2 cursor-pointer">
                <input type="radio" name="visibility" id="n-priv" class="mt-1">
                <div>
                    <div class="font-semibold flex items-center gap-2">${ICONS.repo} Private</div>
                    <div class="text-sm text-gray-400">You choose who can see and commit to this repository.</div>
                </div>
            </label>
        </div>
        
        <div class="mb-6">
            <h4 class="font-semibold mb-2">Initialize this repository with:</h4>
            <label class="flex items-center gap-2 cursor-pointer text-sm">
                <input type="checkbox" id="n-init" checked> Add a README file
            </label>
        </div>
        
        <button onclick="createNewRepo()" class="gh-btn-primary px-4 py-2 text-base">Create repository</button>
    </div>`;
}

async function router() {
    if (!state.pat) return renderLogin();
    if (!state.user) {
        try { state.user = await api('/user'); }
        catch (e) { localStorage.removeItem('gh_pat'); return renderLogin(); }
    }

    const hash = window.location.hash.slice(1);
    
    if (!hash || hash === '/' || hash === '/dashboard') return renderDashboard();
    if (hash === '/new') return renderNewRepo();
    if (hash.startsWith('/profile')) return renderProfile();
    
    const searchMatch = hash.match(/^\/search\?q=(.*)$/);
    if (searchMatch) return renderSearch(decodeURIComponent(searchMatch[1]));

    const userMatch = hash.match(/^\/u\/([^/]+)$/);
    if (userMatch) return renderProfile(userMatch[1]);

    const routeConfig = [
        { regex: /^\/([^/]+)\/([^/]+)\/settings$/, handler: (m) => renderSettings(m[1], m[2]) },
        { regex: /^\/([^/]+)\/([^/]+)\/upload\/([^/]+)\/?(.*)$/, handler: (m) => renderUpload(m[1], m[2], m[3], m[4]) },
        { regex: /^\/([^/]+)\/([^/]+)\/new\/([^/]+)\/?(.*)$/, handler: (m) => renderNewFile(m[1], m[2], m[3], m[4]) },
        { regex: /^\/([^/]+)\/([^/]+)\/delete\/([^/]+)\/(.*)$/, handler: (m) => renderDelete(m[1], m[2], m[3], m[4]) },
        { regex: /^\/([^/]+)\/([^/]+)\/edit\/([^/]+)\/(.*)$/, handler: (m) => renderEdit(m[1], m[2], m[3], m[4]) },
        { regex: /^\/([^/]+)\/([^/]+)\/tree\/([^/]+)\/?(.*)$/, handler: (m) => renderRepo(m[1], m[2], m[3], m[4]) },
        { regex: /^\/([^/]+)\/([^/]+)$/, handler: (m) => renderRepo(m[1], m[2], '', '') }
    ];

    for (let r of routeConfig) {
        const match = hash.match(r.regex);
        if (match) return r.handler(match);
    }
    
    renderDashboard();
}

window.addEventListener('hashchange', router);
window.addEventListener('load', router);

</script>
</body>
